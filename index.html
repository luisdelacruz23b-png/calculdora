<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    width:360px;
    background:#1e293b;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.display{
    margin-bottom:20px;
}

#history{
    color:#94a3b8;
    text-align:right;
    min-height:25px;
    margin-bottom:5px;
    font-size:0.9rem;
}

#screen{
    width:100%;
    height:80px;
    background:#0f172a;
    border:none;
    border-radius:12px;
    color:white;
    text-align:right;
    padding:15px;
    font-size:2rem;
    outline:none;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:12px;
    font-size:1.3rem;
    cursor:pointer;
    background:#334155;
    color:white;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
    opacity:.9;
}

.operator{
    background:#f59e0b;
}

.equal{
    background:#10b981;
}

.zero{
    grid-column:span 2;
}
</style>
</head>

<body>

<div class="calculator">

    <div class="display">
        <div id="history"></div>
        <input type="text" id="screen" readonly>
    </div>

    <div class="buttons">
        <button class="operator" onclick="clearScreen()">AC</button>
        <button class="operator" onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="zero" onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>

</div>

<script>
const screen = document.getElementById("screen");
const historyDisplay = document.getElementById("history");

function append(value){
    screen.value += value;
}

function clearScreen(){
    screen.value = "";
    historyDisplay.textContent = "";
}

function deleteLast(){
    screen.value = screen.value.slice(0,-1);
}

function calculate(){
    try{
        let expression = screen.value.replace(/%/g,"/100");

        historyDisplay.textContent = screen.value;

        const result = Function(
            '"use strict"; return (' + expression + ')'
        )();

        screen.value = result;
    }
    catch{
        screen.value = "Error";
    }
}

document.addEventListener("keydown",(e)=>{

    const allowed = "0123456789+-*/.%";

    if(allowed.includes(e.key)){
        append(e.key);
    }

    if(e.key === "Enter"){
        calculate();
    }

    if(e.key === "Backspace"){
        deleteLast();
    }

    if(e.key === "Escape"){
        clearScreen();
    }
});
</script>

</body>
</html>
